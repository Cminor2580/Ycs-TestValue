name: Sync Sources

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 */4 * * *" 

jobs:
  Sync:
    runs-on: ubuntu-latest
    # permissions:
    #   contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Prepare Dependences
        run: pip install requests openpyxl opencc-python-reimplemented pandas rapidfuzz zhconv

      - name: Download Scripts
        env:
          DOMAIN:       ${{ secrets.DOMAIN }}
          ACCESS_KEY:   ${{ secrets.ACCESS_KEY}}
        run: |
          mkdir -p ./sources
          python process/get.py batch

      - name: Run sync
        env:
          UA:          ${{ secrets.UA }}
          DOMAIN:      ${{ secrets.DOMAIN }}
          ACCESS_KEY:  ${{ secrets.ACCESS_KEY }}
          URL_PATH:    ${{ secrets.URL_PATH }}
          API_URL:     ${{ secrets.API_URL }}
          TOKEN:       ${{ secrets.TOKEN }}
        run: python ./code/iptv/code/sync/sync.py
          
          
